name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ros_distro: [humble, jazzy]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (ROS 2 ${{ matrix.ros_distro }})
        run: docker build --build-arg ROS_DISTRO=${{ matrix.ros_distro }} -t sensx-ros2-${{ matrix.ros_distro }} .
